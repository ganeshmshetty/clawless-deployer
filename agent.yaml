spec_version: "0.1.0"
name: clawless-deployer
version: 1.0.0
description: "A gitagent built for ClawLess — optimizes, validates, and deploys agents to the browser-based WebContainer runtime with zero infrastructure"
model:
  preferred: google:gemini-1.5-flash
  fallback:
    - anthropic:claude-3-5-sonnet-20240620
env:
  GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
  GEMINI_API_KEY: ${GEMINI_API_KEY}
runtime:
  name: node
skills:
  - webcontainer-optimizer
  - bundle-analyzer
  - live-preview-builder
  - offline-fallback
tags:
  - clawless
  - webcontainer
  - browser-runtime
  - zero-install
  - hackathon
  - deployment
