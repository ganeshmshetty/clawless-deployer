name: clawless-offline
description: "Generate a static offline fallback bundle for a gitagent with cached responses and service worker support"
input_schema:
  type: object
  properties:
    repo_path:
      type: string
      description: "Path to the gitagent repository to create fallback for"
    max_size:
      type: integer
      default: 2097152
      description: "Maximum bundle size in bytes (default: 2MB)"
  required:
    - repo_path
implementation:
  type: script
  path: skills/offline-fallback/build-fallback.js
  runtime: node
